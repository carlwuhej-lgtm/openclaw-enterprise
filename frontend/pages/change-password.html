<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码 - OpenClaw Enterprise</title>
  <link rel="stylesheet" href="/css/style.css?v=11">
  <link rel="stylesheet" href="/css/responsive.css?v=11">
</head>
<body>
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-brand">
        <div class="logo-icon">🐱</div>
        <div class="logo-text">
          <h1>OpenClaw</h1>
          <p>Enterprise</p>
        </div>
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">系统工具</div>
      <ul class="nav-menu">
        <li><a href="/pages/clinic"><span class="nav-icon">🏥</span> 急救室</a></li>
        <li><a href="/pages/notification"><span class="nav-icon">🔔</span> 通知配置</a></li>
        <li><a href="/pages/change-password" class="active"><span class="nav-icon">🔑</span> 修改密码</a></li>
      </ul>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div class="breadcrumb">
        <div class="breadcrumb-item"><span>🏠</span><span>首页</span></div>
        <span class="breadcrumb-separator">/</span>
        <div class="breadcrumb-item">修改密码</div>
      </div>
      <div class="topbar-actions">
        <div class="user-menu" id="userMenu" style="cursor: pointer;">
          <div class="user-avatar" id="userAvatar">?</div>
          <div class="user-info">
            <span class="user-name" id="userName">加载中...</span>
            <span class="user-role" id="userRole">-</span>
          </div>
          <div class="dropdown-menu" id="userDropdown" style="display:none;position:absolute;top:100%;right:0;background:var(--dark-card);border:1px solid var(--dark-border);border-radius:8px;padding:6px 0;min-width:120px;margin-top:8px;z-index:100;">
            <a href="#" onclick="logout()" style="display:block;padding:8px 16px;color:var(--text-secondary);text-decoration:none;font-size:0.82rem;transition:color 0.2s;">退出登录</a>
          </div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="page-header">
        <h1 class="page-title">🔑 修改密码</h1>
        <p class="page-subtitle">为了账户安全，请使用强密码</p>
      </div>

      <div class="card" style="max-width:500px;margin:0 auto;">
        <form id="changePasswordForm">
          <div class="form-group">
            <label class="form-label">当前密码</label>
            <input type="password" class="form-input" id="oldPassword" required placeholder="请输入当前密码">
          </div>

          <div class="form-group">
            <label class="form-label">新密码</label>
            <input type="password" class="form-input" id="newPassword" required placeholder="至少 8 位，包含字母和数字" minlength="8">
            <div class="form-hint">密码要求：至少 8 位字符，包含字母和数字</div>
          </div>

          <div class="form-group">
            <label class="form-label">确认新密码</label>
            <input type="password" class="form-input" id="confirmPassword" required placeholder="再次输入新密码">
          </div>

          <div id="errorMessage" style="display:none;padding:12px;background:rgba(255,71,87,0.1);border:1px solid var(--danger);border-radius:8px;color:var(--danger);margin-bottom:16px;"></div>
          <div id="successMessage" style="display:none;padding:12px;background:rgba(0,255,136,0.1);border:1px solid var(--success);border-radius:8px;color:var(--success);margin-bottom:16px;"></div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submitBtn">
              <span class="btn-text">确认修改</span>
              <span class="btn-loading" style="display:none;">修改中...</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="/js/auth.js?v=12"></script>
  <script>
    // 加载用户信息
    document.addEventListener('DOMContentLoaded', async () => {
      await loadUserInfo();
    });

    // 表单提交
    document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const oldPassword = document.getElementById('oldPassword')?.value || '';
      const newPassword = document.getElementById('newPassword')?.value || '';
      const confirmPassword = document.getElementById('confirmPassword')?.value || '';
      
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');
      const submitBtn = document.getElementById('submitBtn');
      
      // 重置消息
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
      
      // 验证
      if (newPassword.length < 8) {
        errorDiv.textContent = '密码长度至少 8 位';
        errorDiv.style.display = 'block';
        return;
      }
      
      if (newPassword !== confirmPassword) {
        errorDiv.textContent = '两次输入的新密码不一致';
        errorDiv.style.display = 'block';
        return;
      }
      
      if (oldPassword === newPassword) {
        errorDiv.textContent = '新密码不能与当前密码相同';
        errorDiv.style.display = 'block';
        return;
      }
      
      // 提交
      submitBtn.disabled = true;
      submitBtn.querySelector('.btn-text').style.display = 'none';
      submitBtn.querySelector('.btn-loading').style.display = 'inline';
      
      try {
        const token = localStorage.getItem('access_token');
        const response = await fetch(`${API_BASE}/api/auth/change-password`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            old_password: oldPassword,
            new_password: newPassword
          })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          successDiv.textContent = '✅ 密码修改成功！请重新登录';
          successDiv.style.display = 'block';
          
          // 3 秒后退出登录
          setTimeout(() => {
            localStorage.removeItem('access_token');
            localStorage.removeItem('user_info');
            window.location.href = '/pages/login.html';
          }, 3000);
        } else {
          errorDiv.textContent = data.detail || data.message || '密码修改失败';
          errorDiv.style.display = 'block';
        }
      } catch (error) {
        errorDiv.textContent = '网络错误，请稍后重试';
        errorDiv.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.querySelector('.btn-text').style.display = 'inline';
        submitBtn.querySelector('.btn-loading').style.display = 'none';
      }
    });
  </script>
</body>
</html>
