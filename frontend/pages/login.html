<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - OpenClaw Enterprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #00d4ff;
            --primary-glow: rgba(0, 212, 255, 0.35);
            --secondary: #00ff88;
            --danger: #ff3b5c;
            --bg-deep: #040810;
            --bg-surface: #0a0e1a;
            --bg-card: #0d1221;
            --border: #1a2332;
            --text-primary: #e4eaf4;
            --text-secondary: #7a8ba0;
            --text-muted: #3d4f63;
            --font-body: 'Outfit', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-deep);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Animated grid background ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 70%);
        }

        /* ── Floating orbs ── */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: orbFloat 12s ease-in-out infinite;
        }

        .bg-orb.orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1), transparent 70%);
            top: -10%; left: -5%;
            animation-duration: 14s;
        }

        .bg-orb.orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.07), transparent 70%);
            bottom: -10%; right: -5%;
            animation-duration: 18s;
            animation-delay: -5s;
        }

        .bg-orb.orb-3 {
            width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.06), transparent 70%);
            top: 50%; right: 20%;
            animation-duration: 10s;
            animation-delay: -3s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -30px) scale(1.05); }
            66% { transform: translate(-15px, 20px) scale(0.95); }
        }

        /* ── Scanline overlay ── */
        .bg-scanline {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 212, 255, 0.008) 2px,
                rgba(0, 212, 255, 0.008) 4px
            );
        }

        .bg-scan-sweep {
            position: fixed;
            left: 0; right: 0;
            height: 120px;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(180deg, transparent, rgba(0, 212, 255, 0.03), transparent);
            animation: scanSweep 6s linear infinite;
        }

        @keyframes scanSweep {
            0% { top: -120px; }
            100% { top: calc(100vh + 120px); }
        }

        /* ── Main login area ── */
        .login-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }

        /* ── Brand section ── */
        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
            position: relative;
            box-shadow:
                0 0 24px var(--primary-glow),
                0 0 60px rgba(0, 212, 255, 0.12);
        }

        /* Breathing glow ring */
        .brand-logo::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 18px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            animation: logoBreath 3s ease-in-out infinite;
        }

        @keyframes logoBreath {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }

        .brand-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #fff 40%, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .brand-subtitle {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--primary);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .brand-desc {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* ── Login card ── */
        .login-card {
            width: 100%;
            position: relative;
            border-radius: 16px;
            overflow: hidden;
        }

        /* Gradient border via pseudo-element */
        .login-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 1px;
            background: linear-gradient(135deg,
                rgba(0, 212, 255, 0.3),
                rgba(0, 255, 136, 0.1) 30%,
                rgba(0, 212, 255, 0.05) 60%,
                rgba(0, 212, 255, 0.2));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .login-card-inner {
            background: rgba(13, 18, 33, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 36px 32px 32px;
            border-radius: 16px;
        }

        .login-card-header {
            text-align: center;
            margin-bottom: 8px;
        }

        .login-card-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .login-card-header p {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        /* ── Security status indicator ── */
        .security-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 28px;
            padding: 8px 0;
        }

        .security-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--secondary);
            animation: breathe 2.5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--secondary); }
            50% { opacity: 0.4; box-shadow: 0 0 10px var(--secondary), 0 0 20px rgba(0, 255, 136, 0.2); }
        }

        .security-text {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--secondary);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* ── Form ── */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }

        .form-input {
            width: 100%;
            padding: 11px 14px;
            background: rgba(6, 8, 16, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.88rem;
            transition: all 0.25s;
            outline: none;
        }

        .form-input:focus {
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.06), 0 0 16px rgba(0, 212, 255, 0.06);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        /* ── Login button ── */
        .login-button {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.12), rgba(0, 255, 136, 0.06));
            color: var(--primary);
            letter-spacing: 0.02em;
        }

        .login-button:hover {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 255, 136, 0.1));
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.12), 0 4px 16px rgba(0, 0, 0, 0.3);
            transform: translateY(-1px);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .login-button.loading {
            color: transparent;
        }

        .login-button.loading::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            top: 50%;
            left: 50%;
            margin: -9px 0 0 -9px;
            border: 2px solid transparent;
            border-top-color: var(--primary);
            border-right-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Error ── */
        .error-message {
            background: rgba(255, 59, 92, 0.08);
            border: 1px solid rgba(255, 59, 92, 0.2);
            border-radius: 6px;
            padding: 10px 14px;
            color: #ff8fa0;
            font-size: 0.82rem;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-message.show { display: flex; }

        /* ── Footer ── */
        .login-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .login-footer a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .login-footer a:hover { color: var(--primary); }

        /* ── Version ── */
        .version-info {
            text-align: center;
            margin-top: 28px;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .login-wrapper { padding: 16px; }
            .login-card-inner { padding: 28px 24px 24px; }
            .brand-title { font-size: 1.35rem; }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-grid"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
    <div class="bg-scanline"></div>
    <div class="bg-scan-sweep"></div>

    <div class="login-wrapper">
        <!-- Brand -->
        <div class="brand">
            <div class="brand-logo">🐱</div>
            <h1 class="brand-title">OpenClaw Enterprise</h1>
            <div class="brand-subtitle">Security Governance Platform</div>
            <p class="brand-desc">企业级 AI Agent 安全治理平台</p>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <div class="login-card-inner">
                <div class="login-card-header">
                    <h2>安全认证</h2>
                    <p>请验证身份以继续</p>
                </div>

                <div class="security-status">
                    <span class="security-dot"></span>
                    <span class="security-text">Secure Connection Established</span>
                </div>

                <div class="error-message" id="errorMessage">
                    <span>⚠</span>
                    <span id="errorText"></span>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-input" id="username" placeholder="输入您的用户名" required autocomplete="username">
                    </div>

                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" id="password" placeholder="输入密码" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="login-button" id="loginButton">
                        进入系统
                    </button>
                </form>

                <div class="login-footer">
                    <a href="#" onclick="showRegister()">注册新账号</a>
                </div>
            </div>
        </div>

        <div class="version-info">
            v1.0.0 · © 2024 OpenClaw Enterprise
        </div>
    </div>

    <!-- 修改密码弹窗 -->
    <div class="modal-overlay" id="changePasswordModal" style="display:none;">
        <div class="login-card" style="max-width:400px;width:90%;">
            <div class="login-card-inner">
                <div class="login-card-header">
                    <h2>🔒 修改默认密码</h2>
                    <p style="color:var(--danger);margin-top:8px;font-size:0.82rem;">首次登录请立即修改默认密码</p>
                </div>

                <div class="error-message" id="cpErrorMessage" style="margin-top:16px;">
                    <span>⚠</span>
                    <span id="cpErrorText"></span>
                </div>

                <form id="changePasswordForm" style="margin-top:20px;">
                    <div class="form-group">
                        <label class="form-label">新密码</label>
                        <input type="password" class="form-input" id="newPassword" placeholder="至少8位，包含字母和数字" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">确认新密码</label>
                        <input type="password" class="form-input" id="confirmPassword" placeholder="再次输入新密码" required>
                    </div>
                    <button type="submit" class="login-button" id="cpButton">确认修改</button>
                </form>
            </div>
        </div>
    </div>

    <style>
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(4, 8, 16, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>

    <script>
        const API_BASE = window.location.origin;

        // Check if already logged in
        function checkAuth() {
            const token = localStorage.getItem('access_token');
            if (token) {
                window.location.href = './dashboard.html';
            }
        }

        checkAuth();

        // Login form submit
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username')?.value || '';
            const password = document.getElementById('password')?.value || '';
            const button = document.getElementById('loginButton');
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            button.classList.add('loading');
            button.disabled = true;
            errorDiv.classList.remove('show');

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user_info', JSON.stringify(data.user));
                    
                    // 检查是否需要强制修改密码
                    if (data.must_change_password) {
                        showChangePasswordModal(data.access_token);
                    } else {
                        window.location.href = './dashboard.html';
                    }
                } else {
                    errorText.textContent = data.detail || data.message || '认证失败';
                    errorDiv.classList.add('show');
                }
            } catch (error) {
                errorText.textContent = '网络错误，请稍后重试';
                errorDiv.classList.add('show');
            } finally {
                button.classList.remove('loading');
                button.disabled = false;
            }
        });

        // Show change password modal
        let _pendingToken = null;

        function showChangePasswordModal(token) {
            _pendingToken = token;
            document.getElementById('changePasswordModal').style.display = 'flex';
        }

        // Change password form
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword')?.value || '';
            const confirmPassword = document.getElementById('confirmPassword')?.value || '';
            const button = document.getElementById('cpButton');
            const errorDiv = document.getElementById('cpErrorMessage');
            const errorText = document.getElementById('cpErrorText');

            errorDiv.classList.remove('show');

            if (newPassword !== confirmPassword) {
                errorText.textContent = '两次输入的密码不一致';
                errorDiv.classList.add('show');
                return;
            }

            if (newPassword.length < 8) {
                errorText.textContent = '密码长度不能少于 8 位';
                errorDiv.classList.add('show');
                return;
            }

            button.classList.add('loading');
            button.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/auth/change-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${_pendingToken}`
                    },
                    body: JSON.stringify({ old_password: 'admin', new_password: newPassword })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    document.getElementById('changePasswordModal').style.display = 'none';
                    window.location.href = './dashboard.html';
                } else {
                    errorText.textContent = data.detail || data.message || '密码修改失败';
                    errorDiv.classList.add('show');
                }
            } catch (error) {
                errorText.textContent = '网络错误，请稍后重试';
                errorDiv.classList.add('show');
            } finally {
                button.classList.remove('loading');
                button.disabled = false;
            }
        });

        // Register (simplified)
        function showRegister() {
            const username = prompt('请输入用户名：');
            if (!username) return;

            const password = prompt('请输入密码：');
            if (!password) return;

            fetch(`${API_BASE}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, real_name: username })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('注册成功！请等待管理员激活账号。');
                } else {
                    alert(data.detail || data.message || '注册失败');
                }
            })
            .catch(() => { alert('网络错误，请稍后重试'); });
        }
    </script>
</body>
</html>
